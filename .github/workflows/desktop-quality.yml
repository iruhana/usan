name: Desktop Quality Gate

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-quality.yml'

jobs:
  desktop-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Accessibility tests
        run: npm run test:a11y

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e

  desktop-verify-strict:
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Strict verification gate (includes Electron smoke + accessibility)
        env:
          USAN_SMOKE_SELFTEST_TIMEOUT_MS: '60000'
        run: npm run verify:strict

      - name: Locale screenshot audit
        run: npm run test:e2e:locale-audit

      - name: Upload locale audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-locale-audit
          path: apps/desktop/output/playwright/locale-audit
